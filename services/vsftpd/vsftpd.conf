listen=YES
listen_ipv6=NO
session_support=NO

# 认证
anonymous_enable=NO
local_enable=YES
guest_enable=NO

# 目录
local_root=/var/lib/ftp/
chroot_local_user=YES
allow_writeable_chroot=YES
hide_ids=YES

#权限
write_enable=YES
download_enable=YES

# 被动模式
pasv_enable=YES
pasv_address=127.0.0.1
pasv_min_port=50000
pasv_max_port=50100

# 性能与安全
seccomp_sandbox=NO
secure_chroot_dir=/var/run/vsftpd/empty
log_ftp_protocol=YES
dual_log_enable=YES
xferlog_std_format=NO
xferlog_enable=YES
xferlog_file=/var/log/vsftpd/vsftpd.log

# SSL/TLS 配置
ssl_enable=YES
allow_anon_ssl=NO
require_ssl_reuse=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO
rsa_cert_file=/etc/vsftpd/vsftpd.pem
rsa_private_key_file=/etc/vsftpd/vsftpd.pem
ssl_ciphers=HIGH

# 文件权限掩码
local_umask=0022
file_open_mode=0644
